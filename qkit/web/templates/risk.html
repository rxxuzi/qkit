{% extends "base.html" %}
{% block title %}QKIT — Risk{% endblock %}
{% block content %}
<div class="header">
  <h1>VaR / CVaR</h1>
  <div class="breadcrumb"><span>F7</span> RISK</div>
</div>
<div class="content">
<div class="card">
  <div class="form-row">
    <div class="fg"><label>Daily mu (%)</label><input type="number" id="mu" value="0.05" step="0.01"></div>
    <div class="fg"><label>Daily sigma (%)</label><input type="number" id="sigma" value="1.0" step="0.1"></div>
    <div class="fg"><label>Samples</label><input type="number" id="n" value="500" step="100"></div>
    <div class="fg"><label>Confidence (%)</label><input type="number" id="conf" value="95" step="1"></div>
    <button onclick="calcRisk()">Compute</button>
  </div>
</div>
<div id="result"></div>
<script>
async function calcRisk(){
  const p='mu='+document.getElementById('mu').value+'&sigma='+document.getElementById('sigma').value+'&n='+document.getElementById('n').value+'&confidence='+document.getElementById('conf').value;
  const d=await(await fetch('/api/v1/risk?'+p)).json();
  if(d.error)return;
  const pct=v=>(v*100).toFixed(3)+'%';
  document.getElementById('result').innerHTML=
  '<h2>Value at Risk ('+(d.confidence*100).toFixed(0)+'%)</h2>'+
  '<div class="grid g4">'+
    '<div class="card fade-up"><div class="label">Parametric</div><div class="value red">'+pct(d.var_parametric)+'</div></div>'+
    '<div class="card fade-up"><div class="label">Historical</div><div class="value red">'+pct(d.var_historical)+'</div></div>'+
    '<div class="card fade-up"><div class="label">Monte Carlo</div><div class="value red">'+pct(d.var_montecarlo)+'</div></div>'+
    '<div class="card fade-up"><div class="label">Cornish-Fisher</div><div class="value red">'+pct(d.var_cornish_fisher)+'</div></div>'+
  '</div>'+
  '<h2>Conditional VaR (Expected Shortfall)</h2>'+
  '<div class="grid g3">'+
    '<div class="card fade-up"><div class="label">Parametric CVaR</div><div class="value amber">'+pct(d.cvar_parametric)+'</div></div>'+
    '<div class="card fade-up"><div class="label">Historical CVaR</div><div class="value amber">'+pct(d.cvar_historical)+'</div></div>'+
    '<div class="card fade-up"><div class="label">Monte Carlo CVaR</div><div class="value amber">'+pct(d.cvar_montecarlo)+'</div></div>'+
  '</div>'+
  '<div class="card fade-up" style="margin-top:6px"><div class="label">Coherence Check: CVaR >= VaR</div>'+
    '<span class="tag '+(d.cvar_parametric>=d.var_parametric?'green':'red')+'" style="margin-top:6px;display:inline-block">'+(d.cvar_parametric>=d.var_parametric?'PASS':'FAIL')+'</span></div>';
}
</script>
</div>
{% endblock %}
